nR2: 145                        # Number of discrete R2* steps
R2max: 144.0                    # [sec-1] R2* max value
R2cand: [40.0]                  # [sec-1] R2* candidates subject to brute-force optimization
nB0: 100                        # Number of discrete B0 steps
algorithm: QPBO                 # B0-correction based on QPBO graph cuts
mu: 0.1                         # B0 regularization factor
offresPenalty: 0.               # additional off-resonance penalty factor
neighbourhoodRadius: 0.         # [mm] radius for MRF neighborhood (nearest neighbour in each dim is always included)
nICMiter: 10                    # iterations for B0 fine-tuning using ICM
multiScale: True                # multi-scale B0-correction
graphcutLimit: 0.               # resolution scale [mm] above which to perform graph cuts
use3D: True                     # B0-correction in 3D
magnitudeDiscrimination: False  # fat fraction calculation free from magnitude bias
autocrop: True                  # auto-crop low-signal regions
output: null                    # prescribe output images (null for auto)